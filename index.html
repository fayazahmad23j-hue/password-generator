<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Password Generator</title>
</head>

<body>
    <div class="container">
        <h1>Password Generator</h1>
        <div class="inputBox">
            <input type="text" id="passBox" readonly>
        </div>
        <input type="range" min="5" max="20" value="9" id="rangeInput">
        <div class="row">
            <p>Password length</p>
            <span id="length">19</span>
        </div>
        <button id="btn">Make password</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
